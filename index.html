<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="body">
      <div class="container">
        <div class="player-container">
          <div class="player-display">Player 1</div>
        </div>

        <div class="board">
          <div class="board-cell" data-index="1">&nbsp</div>
          <div class="board-cell" data-index="2">&nbsp</div>
          <div class="board-cell" data-index="3">&nbsp</div>
          <div class="board-cell" data-index="4">&nbsp</div>
          <div class="board-cell" data-index="5">&nbsp</div>
          <div class="board-cell" data-index="6">&nbsp</div>
          <div class="board-cell" data-index="7">&nbsp</div>
          <div class="board-cell" data-index="8">&nbsp</div>
          <div class="board-cell" data-index="9">&nbsp</div>
        </div>

        <dialog class="game-start" open>
          <label for="player1">
            <span>Player1 name:</span>
            <input type="text" name="player1" id="player1">
          </label>
          <label for="player2">
            <span>Player2 name:</span>
            <input type="text" name="player2" id="player2">
          </label>
          <button class="submit-btn" type="submit">Submit</button>
        </dialog>

        <dialog class="game-end">
          <p class="result-display"><span class="winner-name"></span> has won the game!</p>
          <form method="dialog">
            <button class="View-btn">View board</button>
            <button class="close-btn">Close</button>
          </form>
        </dialog>

      </div>
    </div>
  </body>
</html>
